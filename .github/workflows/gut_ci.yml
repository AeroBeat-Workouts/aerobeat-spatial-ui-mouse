name: AeroBeat Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  gut-tests:
    name: Restore testbed and run GUT
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 🧰 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 🤖 Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false

      - name: 📦 Install GodotEnv
        shell: bash
        run: |
          dotnet tool install --global Chickensoft.GodotEnv
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: 🔗 Restore testbed dependencies
        working-directory: ./.testbed
        run: godotenv addons install

      - name: 🧭 Import testbed project
        run: godot --headless --path .testbed --import

      - name: 🧪 Run GUT tests
        run: |
          godot --headless --path .testbed --script addons/gut/gut_cmdln.gd \
            -gdir=res://tests \
            -ginclude_subdirs \
            -gexit

      - name: 📦 Stage package like a downstream installed addon
        run: |
          rm -rf .testbed/addons/aerobeat-spatial-ui-mouse
          mkdir -p .testbed/addons/aerobeat-spatial-ui-mouse
          tar \
            --exclude=.git \
            --exclude=.godot \
            --exclude=.beads \
            --exclude=.dolt \
            --exclude=.testbed/.addons \
            --exclude=.testbed/.godot \
            --exclude=.testbed/addons \
            -cf - . | tar -xf - -C .testbed/addons/aerobeat-spatial-ui-mouse

      - name: 🧭 Re-import with staged downstream addon
        run: godot --headless --path .testbed --import

      - name: 🔌 Smoke-test installed addon runtime loading
        run: godot --headless --path .testbed --script res://scripts/validate_installed_addon_paths.gd
